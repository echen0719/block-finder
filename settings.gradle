pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		maven {
			name = "NeoForge"
			url = 'https://maven.neoforged.net/releases' 
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

// Should match your modid
rootProject.name = 'block_finder'

include ('common')
include ('fabric')
include ('neoforge')